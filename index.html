<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dignity | Sovereign Proxy</title>
    <style>
        :root {
            --sakura-blue: #1e90ff;
            --annoyed-red: #ff4d4d;
            --void-black: #050505;
        }

        body {
            background-color: var(--void-black);
            color: var(--sakura-blue);
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            border: 2px solid var(--sakura-blue);
            background: rgba(0, 0, 0, 0.95);
            width: 90%;
            max-width: 1100px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* PROXY SEARCH BAR */
        .proxy-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border: 1px solid #222;
            padding: 10px;
        }

        input {
            flex-grow: 1;
            background: #000;
            border: 1px solid var(--sakura-blue);
            color: var(--sakura-blue);
            padding: 10px;
            outline: none;
        }

        .proxy-view {
            flex-grow: 1;
            border: 1px solid #333;
            background: #111;
            margin-bottom: 15px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* SOUND OVERLAY (TINY GRID) */
        .sound-overlay {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
            max-height: 150px;
            overflow-y: auto;
        }

        button {
            background: transparent;
            border: 1px solid var(--sakura-blue);
            color: var(--sakura-blue);
            font-size: 9px;
            padding: 10px;
            cursor: pointer;
        }

        button:hover {
            background: var(--sakura-blue);
            color: #000;
        }

        .header { color: var(--annoyed-red); font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body onclick="init()">

    <div class="container">
        <div class="header">SOVEREIGN_PROXY // TUNNEL_ACTIVE</div>
        
        <div class="proxy-bar">
            <input type="text" id="urlInput" placeholder="ENTER URL OR SEARCH QUERY...">
            <button onclick="launchProxy()">EXECUTE_BYPASS</button>
        </div>

        <div class="proxy-view">
            <iframe id="proxyFrame" src="about:blank"></iframe>
        </div>

        <div class="header" style="font-size: 10px;">SFX_QUICK_ACCESS</div>
        <div class="sound-overlay">
            <button onclick="p('https://www.myinstants.com/media/sounds/metal-pipe-clang.mp3')">METAL</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/vine-boom.mp3')">VINE</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/dance-till-youre-dead-full.mp3')">DANCE</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/nyan-cat.mp3')">NYAN</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/scp-096-scream.mp3')">SCP</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/discord-notification.mp3')">PING</button>
        </div>
    </div>

    <script>
        function init() { console.log("System Initialized."); }

        function p(u) { new Audio(u).play(); }

        function launchProxy() {
            const val = document.getElementById('urlInput').value;
            const frame = document.getElementById('proxyFrame');
            
            if (val.includes('.') && !val.includes(' ')) {
                // If they typed a URL, try to load it (Note: many sites block iframes)
                frame.src = "https://" + val;
            } else {
                // If it's a search, use an unblocked search engine mirror
                frame.src = "https://www.bing.com/search?q=" + encodeURIComponent(val);
            }
        }

    </script>
</body>
</html>
