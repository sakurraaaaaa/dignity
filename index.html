<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TestNav | Pearson | Blackbird Edition</title>
    <style>
        :root {
            --nav-blue: #004a99;
            --bg-gray: #f4f4f4;
            --border-gray: #cccccc;
            --orange-alert: #ff8c00;
        }

        body {
            background-color: var(--bg-gray);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- LOGIN SCREEN (OVERLAY) --- */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 350px;
            padding: 20px;
            text-align: center;
        }

        .login-box h1 {
            color: var(--nav-blue);
            font-size: 24px;
            margin-bottom: 30px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border-gray);
            border-radius: 4px;
        }

        .sign-in-btn {
            background-color: var(--nav-blue);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        /* --- TESTNAV MAIN UI --- */
        #test-interface {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--nav-blue);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .student-info { font-size: 14px; }

        main {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        .section-box {
            background: white;
            border: 1px solid var(--border-gray);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .editor-side { flex: 2; }
        .output-side { flex: 1; background-color: #f9f9f9; }

        h2 { font-size: 16px; color: #333; margin-top: 0; }

        textarea {
            width: 100%;
            flex: 1;
            border: 1px solid var(--border-gray);
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            padding: 10px;
            resize: none;
            outline-color: var(--nav-blue);
        }

        .footer-nav {
            background: white;
            border-top: 1px solid var(--border-gray);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
        }

        .next-btn {
            background-color: #007bc3;
            color: white;
            border: none;
            padding: 10px 40px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* --- ORANGE FADING UI --- */
        #toast-notification {
            position: fixed;
            top: 20px;
            right: -250px;
            background-color: var(--orange-alert);
            color: white;
            padding: 12px 25px;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: right 0.5s ease, opacity 0.5s ease;
            z-index: 2000;
            opacity: 0;
        }

        /* --- VAULT SECTION --- */
        .vault-item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vault-item span { font-size: 14px; color: #555; }

        .copy-link {
            color: var(--nav-blue);
            text-decoration: none;
            font-size: 12px;
            cursor: pointer;
        }

        .download-link {
            display: inline-block;
            margin-top: 10px;
            color: var(--nav-blue);
            font-size: 13px;
        }
    </style>
</head>
<body>

<div id="toast-notification">Copied to clipboard</div>

<div id="login-screen">
    <div class="login-box">
        <h1>TestNav</h1>
        <p style="color: #666; margin-bottom: 20px;">Sign in to your assessment</p>
        <input type="text" placeholder="Username" id="user">
        <input type="password" placeholder="Password" id="pass">
        <button class="sign-in-btn" onclick="login()">Sign In</button>
    </div>
</div>

<div id="test-interface">
    <header>
        <span>Blackbird Luau Proficiency Test</span>
        <div class="student-info">Architect | Student ID: 10583358597</div>
    </header>

    <main>
        <div class="section-box editor-side">
            <h2>THIS IS TO TEST UR CODING.</h2>
            <textarea id="luau-code" placeholder="Write your test script here..."></textarea>
            <a href="https://www.roblox.com/download" target="_blank" class="download-link">Get most recent Roblox client</a>
        </div>

        <div class="section-box output-side">
            <h2>Evaluation Output</h2>
            <div id="console" style="font-size: 12px; color: #666; font-family: monospace;">
                Ready for evaluation...
            </div>
            <div style="margin-top: 30px;">
                <h2>Script Reference Library</h2>
                <div class="vault-item">
                    <span>Infinite Yield</span>
                    <span class="copy-link" onclick="copyTo('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source\'))()')">Copy Code</span>
                </div>
                <div class="vault-item">
                    <span>Dark Dex</span>
                    <span class="copy-link" onclick="copyTo('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/Babyhamsta/RBLX_Scripts/main/Universal/DarkDexV3.lua\'))()')">Copy Code</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-nav">
        <button class="next-btn" style="background:#eee; color:#333; border: 1px solid #ccc;">Previous</button>
        <button class="next-btn" onclick="evaluateCode()">Execute & Next</button>
    </footer>
</div>

<script>
    function login() {
        document.getElementById('login-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('test-interface').style.display = 'flex';
        }, 500);
    }

    function showToast() {
        const toast = document.getElementById('toast-notification');
        toast.style.right = '20px';
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.right = '-250px';
        }, 2000);
    }

    function copyTo(text) {
        navigator.clipboard.writeText(text);
        showToast();
    }

    function evaluateCode() {
        const out = document.getElementById('console');
        out.innerHTML += "<br>> Scanning for errors...";
        setTimeout(() => {
            out.innerHTML += "<br>> Code block validated.";
        }, 1000);
    }
</script>

</body>
</html>
