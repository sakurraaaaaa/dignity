<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dignity | Sovereign Ultimate</title>
    <style>
        :root {
            --sakura-blue: #1e90ff;
            --annoyed-red: #ff4d4d;
            --void-black: #050505;
            --scan-color: rgba(30, 144, 255, 0.05);
        }

        body {
            background-color: var(--void-black);
            color: var(--sakura-blue);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        .container {
            border: 2px solid var(--sakura-blue);
            padding: 30px;
            background: rgba(0, 0, 0, 0.95);
            box-shadow: 0 0 20px rgba(30, 144, 255, 0.2);
            width: 85%;
            max-width: 1000px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header-box {
            border-bottom: 2px solid var(--annoyed-red);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .title { color: var(--annoyed-red); font-size: 20px; font-weight: bold; letter-spacing: 4px; }

        .sound-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            overflow-y: scroll;
            padding-right: 15px;
        }

        /* HIDING SCROLLBAR FOR STEALTH */
        .sound-grid::-webkit-scrollbar { width: 0px; }

        button {
            background: transparent;
            border: 1px solid var(--sakura-blue);
            color: var(--sakura-blue);
            padding: 15px 5px;
            cursor: pointer;
            font-size: 9px;
            transition: 0.1s;
            overflow: hidden;
        }

        button:hover {
            background: var(--sakura-blue);
            color: #000;
            box-shadow: 0 0 10px var(--sakura-blue);
        }

        .category {
            grid-column: span 4;
            color: #555;
            font-size: 11px;
            margin: 20px 0 10px 0;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
        }

        .scanline {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            background: linear-gradient(to bottom, transparent, var(--scan-color), transparent);
            animation: scan 3s linear infinite;
            pointer-events: none;
        }

        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

        .footer { margin-top: auto; padding-top: 20px; font-size: 10px; color: #333; display: flex; justify-content: space-between; }
    </style>
</head>
