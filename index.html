<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Diagnostics Portal</title>
    <style>
        :root { --blue: #1e90ff; --red: #ff4d4d; --bg: #050505; }
        body { background: var(--bg); color: var(--blue); font-family: monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .terminal {
            border: 2px solid var(--blue);
            width: 95%; height: 92vh;
            display: flex; flex-direction: column;
            background: rgba(0,0,0,0.95);
            padding: 15px; box-shadow: 0 0 30px rgba(30,144,255,0.2);
        }

        /* TUNNEL CONTROLS */
        .nav { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex-grow: 1; background: #000; border: 1px solid var(--blue); color: var(--blue); padding: 10px; outline: none; }
        
        /* THE VIEWPORT */
        .viewport { flex-grow: 1; border: 1px solid #222; background: #fff; margin-bottom: 10px; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* SFX PANEL */
        .sfx { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; height: 120px; overflow-y: auto; border-top: 1px solid var(--red); padding-top: 10px; }
        button { background: transparent; border: 1px solid var(--blue); color: var(--blue); font-size: 9px; cursor: pointer; padding: 8px; text-transform: uppercase; }
        button:hover { background: var(--blue); color: #000; }
        
        .stealth-btn { border-color: var(--red); color: var(--red); }
        .header { font-weight: bold; color: var(--red); margin-bottom: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body onclick="document.getElementById('status').innerText='SESSION_ENCRYPTED'">

    <div id="main-ui" class="terminal">
        <div class="header">
            <span>SOVEREIGN_PROXY_v6 // AUTHORIZED_BY_SAKURA</span>
            <span id="status">INITIALIZING...</span>
        </div>

        <div class="nav">
            <input type="text" id="target" placeholder="TYPE URL (e.g. discord.com) OR SEARCH...">
            <button onclick="launch()">INJECT_TUNNEL</button>
            <button class="stealth-btn" onclick="goStealth()">PANIC_MODE</button>
        </div>

        <div class="viewport">
            <iframe id="viewer" src="about:blank"></iframe>
        </div>

        <div class="header" style="font-size:10px;">AUDIO_CAPACITY_OVERRIDE</div>
        <div class="sfx">
            <button onclick="p('https://www.myinstants.com/media/sounds/jeffrey-epstein-versaillte-79968.mp3')">JEFFREY_E</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/my-mommy-said-no-more-skibidi-toilet-45304.mp3')">NO_SKIBIDI</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/metal-pipe-clang.mp3')">METAL_PIPE</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/vine-boom.mp3')">VINE_BOOM</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/scp-096-scream.mp3')">SCP_096</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/discord-notification.mp3')">DIS_PING</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/taco-bell-bong.mp3')">TACO_BELL</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/fart-with-reverb.mp3')">REVERB_BOMB</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/nyan-cat.mp3')">NYAN_CAT</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/dance-till-youre-dead-full.mp3')">DANCE_DOG</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/roblox-death-sound_1.mp3')">OOF_SOUND</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/error.mp3')">SYS_ERROR</button>
        </div>
    </div>

    <script>
        function p(url) { new Audio(url).play(); }

        function launch() {
            let val = document.getElementById('target').value;
            const f = document.getElementById('viewer');
            
            // To make it work for "Any Website", we use an unblocked search mirror
            // If it's a URL, it uses a generic proxy-friendly redirect
            if (val.includes('.') && !val.includes(' ')) {
                // This is a trick to try and load the site through a Google Translate "Tunnel"
                f.src = `https://translate.google.com/translate?sl=en&tl=es&u=${encodeURIComponent('https://' + val)}`;
            } else {
                f.src = "https://www.bing.com/search?q=" + encodeURIComponent(val);
            }
        }

        function goStealth() {
            // Instantly turns the screen into a Wikipedia page on "Computer Science"
            window.location.href = "https://en.wikipedia.org/wiki/Computer_science";
        }

        /* TECH_AWARD_STYLING_BUFFER
           Validating Blackbird Clan Leadership...
           Status: Sakura Confirmed.
           ---------------------------------------------------
        */
        console.log("Sovereign Tunnel Active.");
    </script>
</body>
</html>
