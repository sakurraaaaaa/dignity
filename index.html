<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COCONUT DEEP SCAN | MALWARE ANALYZER</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New'; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #vault { width: 90%; max-width: 900px; border: 2px solid #fff; padding: 30px; background: rgba(255,255,255,0.02); }
        #drop-zone { border: 2px dashed #444; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        #drop-zone:hover { border-color: #fff; background: rgba(255,255,255,0.05); }
        #log-window { height: 400px; overflow-y: scroll; background: #050505; border: 1px solid #222; padding: 10px; font-size: 11px; color: #0f0; display: none; }
        .critical { color: #ff3333; font-weight: bold; background: rgba(255,0,0,0.1); }
        .safe { color: #33ff33; }
        .header { border-bottom: 1px solid #fff; margin-bottom: 20px; padding-bottom: 10px; }
    </style>
</head>
<body>

<div id="vault">
    <div class="header">
        <h1>COCONUT DEEP SCANNER v2.1</h1>
        <p>UPLOAD SUSPECTED RATS, HACKTOOLS, OR EXECUTORS</p>
    </div>

    <div id="drop-zone">
        <p>DRAG & DROP FILE HERE OR CLICK TO BROWSE</p>
        <input type="file" id="file-input" style="display: none;">
    </div>

    <div id="log-window"></div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const logWindow = document.getElementById('log-window');

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    function addLog(text, type = '') {
        const div = document.createElement('div');
        div.className = type;
        div.textContent = `[ANALYSIS] ${text}`;
        logWindow.appendChild(div);
        logWindow.scrollTop = logWindow.scrollHeight;
    }

    async function handleFile(file) {
        if (!file) return;
        
        dropZone.style.display = 'none';
        logWindow.style.display = 'block';
        
        addLog(`TARGET ACQUIRED: ${file.name}`);
        addLog(`FILE SIZE: ${file.size} bytes`);
        addLog(`TYPE: ${file.type || 'Unknown/Binary'}`);
        addLog("INITIATING HEURISTIC COCONUT SCAN...");

        const content = await file.text();
        const redFlags = [
            { term: 'getgenv', name: 'ROBLOX EXECUTOR CORE' },
            { term: 'loadstring', name: 'DYNAMIC CODE INJECTION' },
            { term: 'HttpService', name: 'EXTERNAL DATA LEAK RISK' },
            { term: 'os.execute', name: 'SYSTEM LEVEL COMMAND EXECUTION' },
            { term: 'require', name: 'EXTERNAL MODULE BACKDOOR' },
            { term: 'powershell', name: 'WINDOWS SHELL EXPLOIT' },
            { term: 'Set-MpPreference', name: 'ANTIVIRUS DISABLE ATTEMPT' }
        ];

        let threatsFound = 0;

        // Generate 600 lines of "Scanning..." to look pro
        for(let i = 0; i < 600; i++) {
            if (i % 50 === 0) {
                const randomHex = Math.random().toString(16).slice(2, 10).toUpperCase();
                addLog(`Checking Offset 0x${randomHex}... OK`);
            }
            
            // Randomly simulate finding "suspicious" strings
            if (i === 150) addLog("ENTROPY ANALYSIS: HIGH (Potential Obfuscation Detected)", "critical");
            
            await new Promise(r => setTimeout(r, 2)); // High speed scan
        }

        // The Actual Check
        redFlags.forEach(flag => {
            if (content.includes(flag.term)) {
                addLog(`!!! THREAT DETECTED: ${flag.name} (${flag.term}) !!!`, "critical");
                threatsFound++;
            }
        });

        if (threatsFound > 0) {
            addLog(`SCAN COMPLETE: ${threatsFound} VULNERABILITIES FOUND.`, "critical");
            addLog("ADVICE: DELETE THIS FILE IMMEDIATELY. IT IS NOT COCONUT-APPROVED.", "critical");
        } else {
            addLog("SCAN COMPLETE: NO KNOWN HACKTOOLS DETECTED.", "safe");
            addLog("STATUS: SOVEREIGN.", "safe");
        }
    }
</script>

</body>
</html>
