<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dignity | Sequoia V22</title>
    <style>
        :root { --accent: #007aff; }
        body { 
            margin: 0; height: 100vh; background: #000; color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica;
            display: flex; align-items: center; justify-content: center;
            background: url('https://raw.githubusercontent.com/f79/macOS-Wallpapers/master/macOS%20Sequoia/Sequoia%20Light.jpg') center/cover;
        }

        /* THE REAL APP WINDOW (VIRTUALIZED) */
        #realApp {
            display: none; width: 900px; height: 600px; background: rgba(20,20,20,0.95);
            border-radius: 12px; border: 1px solid #444; backdrop-filter: blur(20px);
            flex-direction: column; overflow: hidden; box-shadow: 0 0 100px rgba(0,0,0,0.7);
        }

        .title-bar { background: #222; padding: 12px; display: flex; align-items: center; border-bottom: 1px solid #333; }
        .dots { display: flex; gap: 8px; margin-right: 20px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }

        .editor-box { flex-grow: 1; display: flex; background: #000; }
        .side { width: 60px; background: #111; border-right: 1px solid #222; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; }
        .main-edit { flex-grow: 1; padding: 20px; color: #0f0; font-family: 'Consolas', monospace; outline: none; white-space: pre; overflow-y: auto; }

        .bottom-bar { padding: 10px 20px; background: #1a1a1a; display: flex; gap: 15px; align-items: center; }
        .btn { background: var(--accent); color: white; border: none; padding: 8px 18px; border-radius: 5px; font-weight: 600; cursor: pointer; }
        .btn.attach { background: #333; }
        
        #scanScreen { text-align: center; background: rgba(0,0,0,0.6); padding: 50px; border-radius: 20px; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div id="scanScreen">
        <h1 style="font-size: 3rem; margin-bottom: 10px;">Dignity V22</h1>
        <p style="opacity: 0.6;">Waiting for local scan completion...</p>
        <button class="btn" style="margin-top: 30px; padding: 15px 40px;" onclick="startScan()">RUN DIGNITY_SCAN.BAT</button>
    </div>

    <div id="realApp">
        <div class="title-bar">
            <div class="dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#ffbd2e"></div><div class="dot" style="background:#27c93f"></div></div>
            <span style="font-size: 12px; color: #888;">Dignity Executor (Admin Mode)</span>
        </div>
        <div class="editor-box">
            <div class="side">
                <span title="Execute">▶️</span>
                <span title="Clear">🗑️</span>
                <span title="Settings">⚙️</span>
            </div>
            <div class="main-edit" contenteditable="true" spellcheck="false">-- Dignity Luau V22
-- Status: Attached to Client

print("Bypass Successful")</div>
        </div>
        <div class="bottom-bar">
            <button class="btn" onclick="alert('Script Executed!')">Execute</button>
            <button class="btn attach" id="atBtn" onclick="attach()">Attach</button>
            <span id="atStat" style="font-size: 11px; color: #555;">Ready</span>
        </div>
    </div>

    <script>
        function startScan() {
            // 1. Download the BAT
            const bat = `@echo off\ntitle Dignity Scanner\ncolor 0b\necho [!] INITIALIZING SCAN...\ntimeout /t 2 >nul\necho [!] BYPASSING HYPERION...\ntimeout /t 2 >nul\necho [!] SUCCESS. RETURN TO BROWSER.\npause`;
            const blob = new Blob([bat], { type: 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Dignity_Scan.bat'; a.click();

            // 2. The "Auto-Open" logic
            let count = 0;
            const btn = event.target;
            btn.innerText = "SCANNING PC...";
            
            const timer = setInterval(() => {
                count++;
                if(count >= 3) {
                    clearInterval(timer);
                    document.getElementById('scanScreen').style.display = 'none';
                    document.getElementById('realApp').style.display = 'flex';
                }
            }, 1000);
        }

        function attach() {
            const b = document.getElementById('atBtn');
            const s = document.getElementById('atStat');
            b.innerText = "ATTACHING...";
            setTimeout(() => {
                b.style.display = 'none';
                s.innerText = "ATTACHED: RobloxPlayerBeta.exe";
                s.style.color = "#27c93f";
            }, 2000);
        }
    </script>
</body>
</html>
