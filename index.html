<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dignity | Tech Award Elite</title>
    <style>
        :root {
            --sakura-blue: #1e90ff;
            --annoyed-red: #ff4d4d;
            --void-black: #050505;
        }

        body {
            background-color: var(--void-black);
            color: var(--sakura-blue);
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        .container {
            border: 2px solid var(--sakura-blue);
            background: rgba(0, 0, 0, 0.98);
            width: 95%;
            max-width: 1200px;
            height: 92vh;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-shadow: 0 0 40px rgba(30, 144, 255, 0.15);
        }

        /* TUNNEL CONTROLS */
        .proxy-header {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #222;
        }

        input {
            flex-grow: 1;
            background: #000;
            border: 1px solid var(--sakura-blue);
            color: var(--sakura-blue);
            padding: 8px;
            outline: none;
            font-family: monospace;
        }

        .proxy-view {
            flex-grow: 1;
            border: 1px solid #1e90ff44;
            background: #000;
            margin-bottom: 10px;
        }

        iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* THE MASSIVE SOUND GRID */
        .sound-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            max-height: 180px;
            overflow-y: scroll;
            padding: 10px;
            border-top: 1px solid var(--annoyed-red);
        }

        .sound-grid::-webkit-scrollbar { width: 0px; }

        button {
            background: transparent;
            border: 1px solid var(--sakura-blue);
            color: var(--sakura-blue);
            font-size: 8px;
            padding: 10px 2px;
            cursor: pointer;
            transition: 0.1s;
        }

        button:hover { background: var(--sakura-blue); color: #000; box-shadow: 0 0 10px var(--sakura-blue); }

        .label { color: var(--annoyed-red); font-size: 10px; margin-bottom: 5px; font-weight: bold; }
        
        .cat-tag { grid-column: span 6; font-size: 9px; color: #444; border-bottom: 1px solid #222; margin: 5px 0; }
    </style>
</head>
<body onclick="init()">

    <div class="container">
        <div class="label" style="display:flex; justify-content: space-between;">

        <div class="label">SFX_OVERRIDE_PANEL</div>
        <div class="sound-grid">
            <div class="cat-tag">--- SECTOR: MEME_HAZARD ---</div>
            <button onclick="p('https://www.myinstants.com/media/sounds/my-mommy-said-no-more-skibidi-toilet-45304.mp3')">NO_SKIBIDI</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/dance-till-youre-dead-full.mp3')">DANCE_DOG</button>

        </div>
    </div>

    <script>
        function init() { 
            document.getElementById('st').innerText = 'STATUS: AUTHORIZED';
            document.getElementById('st').style.color = '#1e90ff';
        }

        function p(u) { new Audio(u).play(); }

        function launch() {
            const v = document.getElementById('url').value;
            const f = document.getElementById('frame');
            if (v.includes('.') && !v.includes(' ')) {
                f.src = "https://" + v;
            } else {
                // Bing is usually unblocked for "research"
                f.src = "https://www.bing.com/search?q=" + encodeURIComponent(v);
            }
        }
