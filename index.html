<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN V11 | BLACKBIRD PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --apple-glass: rgba(255, 255, 255, 0.8);
            --apple-text: #1d1d1f;
            --accent: #007aff;
            --danger: #ff3b30;
            --success: #34c759;
            --clan-yellow: #fff9c4;
        }

        /* LIQUID CHROMA BACKGROUND */
        body {
            height: 100vh; width: 100vw; overflow: hidden;
            background: linear-gradient(-45deg, #fff9c4, #ffffff, #e3f2fd, #fff9c4);
            background-size: 400% 400%;
            animation: liquidShift 15s ease infinite;
            display: flex; justify-content: center; align-items: center;
        }

        @keyframes liquidShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* AUTH MODAL */
        #authOverlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(255,255,255,0.6); backdrop-filter: blur(60px);
            display: flex; align-items: center; justify-content: center;
        }

        .auth-card {
            width: 420px; padding: 40px; border-radius: 35px;
            background: var(--apple-glass); border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1); text-align: center;
        }

        /* REAL ROBLOX BADGE UI (Cloned for Website) */
        #robloxBadge {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 300px; height: 70px; background: rgba(0,0,0,0.9);
            border-radius: 10px; display: flex; align-items: center; padding: 10px;
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 10001;
            border: 1px solid #444;
        }
        .badge-img { width: 50px; height: 50px; background: url('https://www.roblox.com/asset-thumbnail/image?assetId=248133323&width=420&height=420&format=png') center/cover; border-radius: 50%; }
        .badge-info { margin-left: 15px; color: white; text-align: left; }
        .badge-info b { color: #ffcc00; font-size: 0.75rem; display: block; }
        .badge-info span { font-size: 0.7rem; color: #ccc; }

        /* MAIN UI */
        .app-container {
            width: 96vw; height: 92vh; border-radius: 40px;
            background: var(--apple-glass); backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.4); display: flex; overflow: hidden;
            display: none; /* Hidden until auth */
        }

        .sidebar { width: 280px; padding: 40px 20px; background: rgba(255,255,255,0.2); border-right: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .nav-btn { padding: 14px 20px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; font-weight: 600; color: #555; transition: 0.2s; border: none; background: transparent; text-align: left; width: 100%; }
        .nav-btn:hover { background: rgba(0,0,0,0.03); }
        .nav-btn.active { background: #fff; color: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .content { flex-grow: 1; padding: 50px; overflow-y: auto; }
        .tab { display: none; flex-direction: column; height: 100%; }
        .tab.active { display: flex; }

        /* CHAT SECTION */
        .chat-area { flex-grow: 1; background: #fff; border-radius: 20px; border: 1px solid #eee; display: flex; flex-direction: column; overflow: hidden; }
        #chatBox { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 12px; max-width: 80%; font-size: 0.85rem; position: relative; }
        .msg-other { background: #f1f1f1; align-self: flex-start; }
        .msg-self { background: var(--accent); color: white; align-self: flex-end; }
        .msg-info { font-size: 0.6rem; color: #888; margin-top: 4px; display: block; }

        /* INPUTS */
        .apple-input { padding: 15px; border-radius: 12px; border: 1px solid #eee; outline: none; font-size: 0.9rem; width: 100%; margin-top: 10px; }
        .btn-main { padding: 12px 25px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; background: var(--accent); color: white; }
        
        /* PROFILE */
        .profile-img-big { width: 120px; height: 120px; border-radius: 50%; border: 4px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); cursor: pointer; overflow: hidden; }
        .profile-img-big img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <form class="auth-card" onsubmit="login(event)">
            <h2 style="margin-bottom: 20px;">Sovereign Protocol</h2>
            <p style="color:red; font-size: 0.7rem; margin-bottom: 15px; font-weight: 700;">DO NOT USE REAL ROBLOX PASSWORD.</p>
            <input type="text" id="userIn" class="apple-input" placeholder="Roblox Username" required autocomplete="username">
            <input type="password" id="passIn" class="apple-input" placeholder="Sovereign Password" required autocomplete="new-password">
            <button type="submit" class="btn-main" style="width: 100%; margin-top: 20px;">Access Uplink</button>
        </form>
    </div>

    <div id="robloxBadge">
        <div class="badge-img"></div>
        <div class="badge-info">
            <b>Badge Awarded!</b>
            <span id="badgeMsg">Attached - Sovereign V11</span>
        </div>
    </div>

    <div class="app-container" id="app">
        <div class="sidebar">
            <h1 style="font-size: 1.2rem; margin-bottom: 30px;">BLACKBIRD</h1>
            <button class="nav-btn active" onclick="tab(event, 'dash')">Dashboard</button>
            <button class="nav-btn" onclick="tab(event, 'exec')">Executor</button>
            <button class="nav-btn" onclick="tab(event, 'chat')">Clan Chat</button>
            <button class="nav-btn" onclick="tab(event, 'prof')">Profile</button>
        </div>

        <div class="content">
            <div id="dash" class="tab active">
                <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 40px;">
                    <div class="profile-img-big"><img id="pfp" src=""></div>
                    <div>
                        <h2 id="uDisp">GUEST</h2>
                        <p style="color:#888;">Clan Sovereign</p>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div style="background: white; padding: 30px; border-radius: 25px; text-align: center;">
                        <h4 style="color:#888;">CLAN POPULATION</h4>
                        <h1 style="font-size: 3rem;">1,402</h1>
                        <span style="color:var(--success); font-weight:700;">+12 today</span>
                    </div>
                    <div style="background: white; padding: 30px; border-radius: 25px; text-align: center;">
                        <h4 style="color:#888;">SESSION TIME</h4>
                        <h1 id="timer" style="font-size: 3rem;">0s</h1>
                    </div>
                </div>
                <button class="btn-main" style="width: 100%; margin-top: 20px; height: 60px; background: #ffcc00; color: black;" 
                        onclick="window.open('https://www.roblox.com/game-pass/1785028840/Support-the-dev')">SUPPORT THE DEV</button>
            </div>

            <div id="exec" class="tab">
                <div style="flex-grow: 1; background: #fff; border-radius: 20px; border: 1px solid #eee; display: flex; flex-direction: column;">
                    <div style="padding: 10px 20px; background: #f9f9f9; border-bottom: 1px solid #eee; font-size: 0.7rem; font-weight: 700; display: flex; justify-content: space-between;">
                        <span>SOVEREIGN_ENGINE.LUA</span>
                        <span id="status" style="color:red;">NOT ATTACHED</span>
                    </div>
                    <textarea id="editor" style="flex-grow: 1; padding: 20px; font-family: 'JetBrains Mono'; border: none; outline: none; resize: none;" placeholder="-- Input Code..."></textarea>
                    <div style="padding: 15px; display: flex; gap: 10px; background: #f9f9f9;">
                        <button class="btn-main" style="background:var(--success)" onclick="attach()">ATTACH</button>
                        <button class="btn-main" onclick="execute()">EXECUTE</button>
                    </div>
                </div>
            </div>

            <div id="chat" class="tab">
                <div class="chat-area">
                    <div id="chatBox"></div>
                    <div style="padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px;">
                        <input type="text" id="chatIn" class="apple-input" placeholder="Type a message..." style="margin-top:0;">
                        <button class="btn-main" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>

            <div id="prof" class="tab">
                <h2>Profile Management</h2>
                <div style="margin-top: 30px;">
                    <label>Change Bio</label>
                    <textarea id="bioIn" class="apple-input" style="height: 100px;" placeholder="Write your bio..."></textarea>
                    
                    <label style="margin-top: 20px; display: block;">Change Profile Picture</label>
                    <input type="file" id="fileIn" style="display: none;" accept="image/*" onchange="updatePFP(event)">
                    <button class="btn-main" style="margin-top: 10px; background: #eee; color: black;" onclick="document.getElementById('fileIn').click()">Open Screenshots/Files</button>
                    
                    <button class="btn-main" style="width: 100%; margin-top: 40px;" onclick="alert('Profile Updated!')">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = "";
        let isMuted = false;

        // AUTH
        function login(e) {
            e.preventDefault();
            currentUser = document.getElementById('userIn').value;
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('uDisp').innerText = currentUser.toUpperCase();
            document.getElementById('pfp').src = `https://www.roblox.com/headshot-thumbnail/image?width=150&height=150&format=png&username=${currentUser}`;
            startTimer();
        }

        // TABS
        function tab(e, id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        // STATS
        function startTimer() {
            let s = 0;
            setInterval(() => { s++; document.getElementById('timer').innerText = s + "s"; }, 1000);
        }

        // ATTACH & REAL BADGE
        let attached = false;
        function attach() {
            document.getElementById('status').innerText = "ATTACHING...";
            document.getElementById('status').style.color = "orange";
            
            setTimeout(() => {
                attached = true;
                document.getElementById('status').innerText = "ATTACHED";
                document.getElementById('status').style.color = "green";
                triggerBadge("Attached!", "Sovereign DLL Hooked");
            }, 2000);
        }

        function triggerBadge(title, msg) {
            const b = document.getElementById('robloxBadge');
            document.getElementById('badgeMsg').innerHTML = `<b>${title}</b><span>${msg}</span>`;
            b.style.top = "20px";
            setTimeout(() => { b.style.top = "-100px"; }, 4000);
        }

        function execute() {
            if(!attached) return alert("Must attach before execution.");
            triggerBadge("Executed!", "Script sent to client");
        }

        // CHAT WITH FILTER
        const filter = ["nsfw", "cuss1", "cuss2", "badword", "predator"]; // Add your real filter list here
        function sendMessage() {
            if(isMuted) return alert("You are muted for 1 hour due to filter violation.");
            let m = document.getElementById('chatIn').value;
            if(!m) return;

            let hasBadWord = filter.some(word => m.toLowerCase().includes(word));
            if(hasBadWord) {
                isMuted = true;
                alert("CHAT VIOLATION: You are muted for 1 hour.");
                setTimeout(() => { isMuted = false; }, 3600000);
                return;
            }

            const box = document.getElementById('chatBox');
            const time = new Date().toLocaleTimeString();
            box.innerHTML += `<div class="msg msg-self"><strong>${currentUser}</strong>: ${m} <span class="msg-info">${time}</span></div>`;
            document.getElementById('chatIn').value = "";
            box.scrollTop = box.scrollHeight;
        }

        // PROFILE PICTURE
        function updatePFP(event) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('pfp').src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</body>
</html>
